<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLAXX · App iOS</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #0a0a0a; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app-kit.jsx"></script>
<script type="text/babel" src="app-screens-a.jsx"></script>
<script type="text/babel" src="app-screens-b.jsx"></script>

<script type="text/babel" data-presets="react">
  const { useState } = React;

  // device wrapper — uses IOSDevice as bezel only (no nav bar)
  function Phone({ children, dark = true }) {
    return <IOSDevice dark={dark} width={390} height={844}>{children}</IOSDevice>;
  }

  const SCREENS = [
    { id: 'onboarding', label: 'Onboarding · Login', el: <ScreenOnboarding /> },
    { id: 'home', label: 'Home · Dashboard', el: <ScreenHome /> },
    { id: 'carteira', label: 'Carteira · Evolução', el: <ScreenCarteira /> },
    { id: 'resgates', label: 'Resgates · Catálogo', el: <ScreenResgates /> },
    { id: 'reward', label: 'Recompensa · Checkout', el: <ScreenRewardDetail /> },
    { id: 'comprar', label: 'Comprar pontos', el: <ScreenComprar /> },
    { id: 'enviar', label: 'Enviar pontos', el: <ScreenEnviar /> },
    { id: 'campanhas', label: 'Campanhas · Missões', el: <ScreenCampanhas /> },
    { id: 'indique', label: 'Indique e ganhe', el: <ScreenIndique /> },
    { id: 'notif', label: 'Notificações', el: <ScreenNotificacoes /> },
  ];

  function App() {
    return (
      <DesignCanvas
        title={<span style={{fontWeight:900,letterSpacing:'0.01em'}}>BLA<span style={{color:'#AEE63A'}}>XX</span> <span style={{fontWeight:500,opacity:0.6}}>· App iOS</span></span>}
        subtitle="10 telas · dark + verde-limão · gamificado">
        <DCSection id="fluxo-principal" title="Fluxo principal" subtitle="Comprar e enviar pontos — o coração do app">
          {SCREENS.slice(1, 3).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={390} height={844}>
              <Phone>{s.el}</Phone>
            </DCArtboard>
          ))}
          {SCREENS.filter(s => ['comprar','enviar'].includes(s.id)).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={390} height={844}>
              <Phone>{s.el}</Phone>
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="recompensas" title="Recompensas & gamificação" subtitle="Resgatar, missões e indicação">
          {SCREENS.filter(s => ['resgates','reward','campanhas','indique'].includes(s.id)).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={390} height={844}>
              <Phone>{s.el}</Phone>
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="entrada-avisos" title="Entrada & avisos" subtitle="Primeiro acesso e central de notificações">
          {SCREENS.filter(s => ['onboarding','notif'].includes(s.id)).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={390} height={844}>
              <Phone>{s.el}</Phone>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
