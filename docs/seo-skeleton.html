<!--
  ESQUELETO DE SEO - BlaxX Pontos
  Cole este bloco dentro do <head>, logo apos a tag <title>.
  Substitua os placeholders {{...}} pelos valores da pagina.

  Placeholders:
    {{TITULO}}     - Titulo da pagina (ex: "Como funciona")
    {{DESCRICAO}}  - Resumo de 120-160 caracteres, sem repetir o titulo
    {{SLUG}}       - Nome do arquivo sem dominio (ex: "como-funciona.html")
    {{BREADCRUMB}} - Nome curto da pagina para o breadcrumb (ex: "Como funciona")
-->

<!-- Basico -->
<meta name="description" content="{{DESCRICAO}}">
<meta name="theme-color" content="#080907">
<link rel="canonical" href="https://www.blaxxpontos.com.br/{{SLUG}}">

<!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="BlaxX Pontos">
<meta property="og:locale" content="pt_BR">
<meta property="og:url" content="https://www.blaxxpontos.com.br/{{SLUG}}">
<meta property="og:title" content="{{TITULO}} | BlaxX Pontos">
<meta property="og:description" content="{{DESCRICAO}}">
<meta property="og:image" content="https://www.blaxxpontos.com.br/assets/blaxx-logo.png">

<!-- Twitter / X Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITULO}} | BlaxX Pontos">
<meta name="twitter:description" content="{{DESCRICAO}}">
<meta name="twitter:image" content="https://www.blaxxpontos.com.br/assets/blaxx-logo.png">

<!-- PWA / icones (apenas em paginas que NAO usam chrome.js) -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Blaxx">
<meta name="mobile-web-app-capable" content="yes">

<!-- JSON-LD: BreadcrumbList (coloque antes de </head>) -->
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Inicio","item":"https://www.blaxxpontos.com.br/"},{"@type":"ListItem","position":2,"name":"{{BREADCRUMB}}","item":"https://www.blaxxpontos.com.br/{{SLUG}}"}]}
</script>

<!--
  JSON-LD: Organization + WebSite
  Use APENAS na home (index.html). Nao repita nas paginas internas.
-->
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Organization","name":"BlaxX Pontos","url":"https://www.blaxxpontos.com.br/","logo":"https://www.blaxxpontos.com.br/assets/blaxx-logo.png","sameAs":["https://instagram.com/blaxx.pontos"]}
</script>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":"BlaxX Pontos","url":"https://www.blaxxpontos.com.br/"}
</script>
