<body>

  <div class="auth-wrap">
    <div class="card auth">
      <h1>Recuperar senha.</h1>
      <p class="sub">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
      <div id="msg" class="msg" style="display:none"></div>
      <div class="f" id="formWrap">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="voce@email.com" autocomplete="email">
      </div>
      <button id="btnSend" type="button" class="btn btn--dark btn--block">Enviar link de recuperação →</button>
      <p style="font-size:12px;color:var(--fg-subtle);text-align:center;margin:16px 0 0">O link expira em 30 minutos.</p>
    </div>
  </div>

  <div class="auth-foot">© 2026 BLAXX PONTOS · <a href="termos.html">TERMOS</a> · <a href="privacidade.html">PRIVACIDADE</a> · <a href="ajuda.html">AJUDA</a></div>

  <script src="assets/blaxx-config.js"></script>
  <script>
  (function(){
    var DEFAULT_API = (window.BLAXX_API || 'https://blaxx-pontos-exe.onrender.com');
    function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
    var $ = function(id){ return document.getElementById(id); };
    var msg = $('msg'), btn = $('btnSend');
    function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; msg.style.display = 'block'; }

    function send(){
      var email = $('email').value.trim();
      if (!email){ show('err', 'Informe seu e-mail.'); return; }
      btn.disabled = true; var old = btn.textContent; btn.textContent = 'Enviando…';
      fetch(apiBase() + '/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: email }) })
        .then(function(r){ return r.json().catch(function(){ return {}; }); })
        .then(function(){
          // Resposta sempre 200 (anti-enumeração) — mensagem genérica.
          show('ok', 'Se este e-mail estiver cadastrado, enviamos as instruções de redefinição. Verifique a caixa de entrada e o spam.');
          $('formWrap').style.display = 'none';
          btn.style.display = 'none';
        })
        .catch(function(e){ btn.disabled = false; btn.textContent = old; show('err', 'Falha de conexão: ' + e.message); });
    }
    btn.addEventListener('click', send);
    $('email').addEventListener('keydown', function(e){ if (e.key === 'Enter') send(); });
  })();
  </script>
<script>
  if ('serviceWorker' in navigator) {
