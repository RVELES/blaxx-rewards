<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaxX · Criar conta</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--chrome); min-height: 100vh; display: flex; flex-direction: column; }
  .auth-top { display: flex; align-items: center; justify-content: space-between; padding: 22px 28px; }
  .auth-top img { height: 40px; }
  .auth-top a.alt { font-size: 13.5px; font-weight: 600; color: var(--chrome-fg-muted); }
  .auth-top a.alt b { color: var(--lime); }
  .auth-wrap { flex: 1; display: grid; place-items: center; padding: 24px; }
  .auth { width: 100%; max-width: 440px; padding: 36px; animation: rise .5s var(--ease-out) both; }
  .auth h1 { font-family: var(--font-display); font-weight: 900; font-size: 30px; letter-spacing: -0.02em; margin: 0 0 4px; }
  .auth .sub { font-size: 14px; color: var(--fg-muted); margin: 0 0 22px; }
  .welcome { display: inline-flex; align-items: center; gap: 8px; background: var(--lime-12); border: 1px solid var(--lime-40); border-radius: var(--r-pill); padding: 7px 14px; font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--lime-deep); margin-bottom: 18px; }
  .f { margin-bottom: 15px; }
  .f label { display: block; font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 7px; }
  .f input { width: 100%; border: 1px solid var(--line-strong); border-radius: var(--r-sm); background: var(--cream); padding: 13px 14px; font-family: var(--font-body); font-size: 14.5px; color: var(--fg); outline: none; transition: border-color .2s var(--ease), box-shadow .2s var(--ease); }
  .f input:focus { border-color: var(--lime-deep); box-shadow: 0 0 0 3px var(--lime-20); }
  .legal { font-size: 12px; color: var(--fg-subtle); margin: 14px 0 18px; }
  .legal a { text-decoration: underline; }
  .auth-foot { text-align: center; padding: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--chrome-fg-muted); }
  .auth-foot a { text-decoration: underline; }
</style>
</head>
<body>
  <div class="auth-top">
    <a href="index.html"><img src="assets/blaxx-logo.png" alt="BLAXX Pontos"></a>
    <a class="alt" href="login.html">Já tem conta? <b>Entrar →</b></a>
  </div>

  <div class="auth-wrap">
    <div class="card auth">
      <span class="welcome">🎁 GANHE 500 PTS DE BOAS-VINDAS</span>
      <h1>Crie sua conta grátis.</h1>
      <p class="sub">Menos de 2 minutos, sem mensalidade.</p>
      <div class="f">
        <label for="nome">Nome completo</label>
        <input id="nome" type="text" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="f">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="voce@email.com" autocomplete="email">
      </div>
      <div class="f">
        <label for="cpf">CPF</label>
        <input id="cpf" type="text" inputmode="numeric" placeholder="000.000.000-00" autocomplete="off">
      </div>
      <div class="f">
        <label for="cel">Celular</label>
        <input id="cel" type="tel" placeholder="(11) 9 0000-0000" autocomplete="tel">
      </div>
      <div class="f">
        <label for="pass">Senha</label>
        <input id="pass" type="password" placeholder="Mínimo 7 caracteres" autocomplete="new-password" minlength="7">
      </div>
      <label class="legal" style="display:flex;gap:9px;align-items:flex-start;cursor:pointer">
        <input id="accept" type="checkbox" style="accent-color:var(--lime-deep);margin-top:2px">
        <span>Li e aceito os <a href="termos.html">termos de uso</a>, as <a href="regras-pontos.html">regras de pontos</a> e a <a href="privacidade.html">política de privacidade</a> (LGPD).</span>
      </label>
      <div id="regErr" style="display:none;background:rgba(224,72,61,.08);border:1px solid rgba(224,72,61,.3);color:#c0392b;font-size:13px;padding:10px 12px;border-radius:var(--r-sm);margin:0 0 14px"></div>
      <button id="btnReg" type="button" class="btn btn--dark btn--block">Criar conta grátis →</button>
    </div>
  </div>

  <div class="auth-foot">© 2026 BLAXX PONTOS · <a href="termos.html">TERMOS</a> · <a href="privacidade.html">PRIVACIDADE</a> · <a href="ajuda.html">AJUDA</a></div>

  <script>
  (function(){
    var DEFAULT_API = 'https://blaxx-pontos-exe.onrender.com';
    function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
    var $ = function(id){ return document.getElementById(id); };
    var err = $('regErr'), btn = $('btnReg');
    function showErr(m){ err.textContent = m; err.style.display = 'block'; }
    function clearErr(){ err.style.display = 'none'; }

    try { if ((JSON.parse(localStorage.getItem('blaxx_session')||'null')||{}).token) location.replace('index.html'); } catch(e){}

    function doReg(){
      clearErr();
      var name = $('nome').value.trim(), email = $('email').value.trim();
      var cpf = $('cpf').value.trim(), phone = $('cel').value.trim(), pw = $('pass').value;
      if (name.split(/\s+/).filter(Boolean).length < 2){ showErr('Informe nome e sobrenome.'); return; }
      if (!email){ showErr('Informe o e-mail.'); return; }
      if (!cpf){ showErr('Informe o CPF.'); return; }
      if (!pw || pw.length < 7){ showErr('A senha precisa ter no mínimo 7 caracteres.'); return; }
      if (!$('accept').checked){ showErr('Você precisa aceitar os termos e a LGPD.'); return; }
      var body = { name:name, email:email, cpf:cpf, password:pw, accept_terms:true, accept_privacy:true, accept_lgpd:true };
      if (phone) body.phone = phone;
      btn.disabled = true; var old = btn.textContent; btn.textContent = 'Criando conta…';
      fetch(apiBase() + '/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) })
        .then(function(r){ return r.json().then(function(j){ return { s:r.status, j:j }; }); })
        .then(function(res){
          btn.disabled = false; btn.textContent = old;
          if (res.s === 201 && res.j.token){
            try { localStorage.setItem('blaxx_session', JSON.stringify(res.j)); } catch(e){}
            location.href = 'index.html'; return;
          }
          showErr((res.j && res.j.error) || 'Não foi possível criar a conta.');
        })
        .catch(function(e){ btn.disabled = false; btn.textContent = old; showErr('Falha de conexão: ' + e.message); });
    }
    btn.addEventListener('click', doReg);
    $('pass').addEventListener('keydown', function(e){ if (e.key === 'Enter') doReg(); });
  })();
  </script>
</body>
</html>
