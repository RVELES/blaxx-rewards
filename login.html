<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaxX · Entrar</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--chrome); min-height: 100vh; display: flex; flex-direction: column; }
  .auth-top { display: flex; align-items: center; justify-content: space-between; padding: 22px 28px; }
  .auth-top img { height: 40px; }
  .auth-top a.alt { font-size: 13.5px; font-weight: 600; color: var(--chrome-fg-muted); }
  .auth-top a.alt b { color: var(--lime); }
  .auth-wrap { flex: 1; display: grid; place-items: center; padding: 24px; }
  .auth { width: 100%; max-width: 420px; padding: 36px; animation: rise .5s var(--ease-out) both; }
  .auth h1 { font-family: var(--font-display); font-weight: 900; font-size: 30px; letter-spacing: -0.02em; margin: 0 0 4px; }
  .auth .sub { font-size: 14px; color: var(--fg-muted); margin: 0 0 24px; }
  .f { margin-bottom: 16px; }
  .f label { display: block; font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 7px; }
  .f input { width: 100%; border: 1px solid var(--line-strong); border-radius: var(--r-sm); background: var(--cream); padding: 13px 14px; font-family: var(--font-body); font-size: 14.5px; color: var(--fg); outline: none; transition: border-color .2s var(--ease), box-shadow .2s var(--ease); }
  .f input:focus { border-color: var(--lime-deep); box-shadow: 0 0 0 3px var(--lime-20); }
  .row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; margin: 4px 0 20px; }
  .row a { font-weight: 700; text-decoration: underline; }
  .auth-foot { text-align: center; padding: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--chrome-fg-muted); }
  .auth-foot a { text-decoration: underline; }
</style>
</head>
<body>
  <div class="auth-top">
    <a href="index.html"><img src="assets/blaxx-logo.png" alt="BLAXX Pontos"></a>
    <a class="alt" href="cadastro.html">Não tem conta? <b>Cadastre-se →</b></a>
  </div>

  <div class="auth-wrap">
    <div class="card auth">
      <h1>Bem-vindo de volta.</h1>
      <p class="sub">Entre para acessar seus pontos.</p>
      <div class="f">
        <label for="email">E-mail ou CPF</label>
        <input id="email" type="text" placeholder="voce@email.com" autocomplete="username">
      </div>
      <div class="f">
        <label for="pass">Senha</label>
        <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:7px;color:var(--fg-muted)"><input type="checkbox" checked style="accent-color:var(--lime-deep)"> Lembrar de mim</label>
        <a href="ajuda.html">Esqueci a senha</a>
      </div>
      <a href="index.html" class="btn btn--dark btn--block">Entrar →</a>
      <p style="font-size:12px;color:var(--fg-subtle);text-align:center;margin:16px 0 0">Protegido por verificação em duas etapas (2FA).</p>
    </div>
  </div>

  <div class="auth-foot">© 2026 BLAXX PONTOS · <a href="termos.html">TERMOS</a> · <a href="privacidade.html">PRIVACIDADE</a> · <a href="ajuda.html">AJUDA</a></div>
</body>
</html>
