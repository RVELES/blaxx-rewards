<body>
  <div class="auth-top">
    <a href="index.html"><img src="assets/blaxx-logo.png" alt="BLAXX Pontos"></a>
    <a class="alt" href="login.html">Voltar para <b>Entrar →</b></a>
  </div>

  <div class="auth-wrap">
    <div class="card auth">
      <h1>Definir nova senha.</h1>
      <p class="sub">Escolha uma senha forte (mínimo 7 caracteres).</p>
      <div id="msg" class="msg" style="display:none"></div>
      <div id="formWrap">
        <div class="f">
          <label for="pass">Nova senha</label>
          <input id="pass" type="password" placeholder="••••••••" autocomplete="new-password" minlength="7">
        </div>
        <div class="f">
          <label for="pass2">Confirmar senha</label>
          <input id="pass2" type="password" placeholder="••••••••" autocomplete="new-password" minlength="7">
        </div>
        <button id="btnReset" type="button" class="btn btn--dark btn--block">Salvar nova senha →</button>
      </div>
    </div>
  </div>

  <div class="auth-foot">© 2026 BLAXX PONTOS · <a href="termos.html">TERMOS</a> · <a href="privacidade.html">PRIVACIDADE</a> · <a href="ajuda.html">AJUDA</a></div>

  <script src="assets/blaxx-config.js"></script>
  <script>
  (function(){
    var DEFAULT_API = (window.BLAXX_API || 'https://blaxx-pontos-exe.onrender.com');
    function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
    var $ = function(id){ return document.getElementById(id); };
    var msg = $('msg'), btn = $('btnReset');
    function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; msg.style.display = 'block'; }

    // token vem na query (?token=) — enviado por e-mail.
    var params = new URLSearchParams(location.search);
    var token = params.get('token') || '';
    if (!token){
      show('err', 'Link inválido ou incompleto. Solicite um novo em "Esqueci a senha".');
      $('formWrap').style.display = 'none';
    }

    function reset(){
      var pw = $('pass').value, pw2 = $('pass2').value;
      if (!pw || pw.length < 7){ show('err', 'A senha precisa ter no mínimo 7 caracteres.'); return; }
      if (pw !== pw2){ show('err', 'As senhas não conferem.'); return; }
      btn.disabled = true; var old = btn.textContent; btn.textContent = 'Salvando…';
      fetch(apiBase() + '/auth/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: token, password: pw }) })
        .then(function(r){ return r.json().then(function(j){ return { s:r.status, j:j }; }); })
        .then(function(res){
          if (res.s === 200 && res.j.ok){
            show('ok', 'Senha redefinida com sucesso! Redirecionando para o login…');
            $('formWrap').style.display = 'none';
            setTimeout(function(){ location.href = 'login.html'; }, 1600);
            return;
          }
          btn.disabled = false; btn.textContent = old;
          show('err', (res.j && res.j.error) || 'Não foi possível redefinir a senha.');
        })
        .catch(function(e){ btn.disabled = false; btn.textContent = old; show('err', 'Falha de conexão: ' + e.message); });
    }
    btn.addEventListener('click', reset);
    $('pass2').addEventListener('keydown', function(e){ if (e.key === 'Enter') reset(); });
  })();
  </script>
<script>
  if ('serviceWorker' in navigator) {
