<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaXx · Extrato</title>
<link rel="stylesheet" href="styles.css">
<style>
  .page-head { margin-bottom: 24px; }
  .sum-row { display:grid; grid-template-columns: repeat(3,1fr); gap:16px; margin-bottom: 24px; }
  .sum { padding: 20px 22px; }
  .sum__label { font-family: var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color: var(--fg-subtle); }
  .sum__val { font-family: var(--font-mono); font-weight:700; font-size: 28px; letter-spacing:-.02em; margin-top:8px; }
  .sum__val.pos { color: var(--pos); } .sum__val.neg { color: var(--neg); }

  .toolbar { display:flex; align-items:center; gap:12px; margin-bottom: 18px; flex-wrap: wrap; }
  .tabs { display:flex; gap:6px; background: var(--white); border:1px solid var(--line); padding:5px; border-radius: var(--r-pill); }
  .tabs button { border:0; background:transparent; font-weight:700; font-size:13.5px; color: var(--fg-muted); padding:8px 18px; border-radius: var(--r-pill); transition: all .18s var(--ease); cursor:pointer; }
  .tabs button.on { background: var(--ink); color: var(--lime); }
  .search { margin-left:auto; display:flex; align-items:center; gap:8px; background: var(--white); border:1px solid var(--line); border-radius: var(--r-pill); padding: 9px 16px; min-width: 220px; color: var(--fg-muted); }
  .search input { border:0; background:transparent; outline:none; font-family: var(--font-body); font-size:14px; width:100%; color: var(--fg); }

  .day-label { font-family: var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color: var(--fg-subtle); margin: 26px 4px 10px; }
  .ledger { padding: 6px 0; }
  .row { display:flex; align-items:center; gap:16px; padding: 15px 24px; transition: background .15s var(--ease); }
  .row + .row { border-top: 1px solid var(--line); }
  .row:hover { background: rgba(14,15,11,0.025); }
  .row__ico { width:42px; height:42px; border-radius:11px; display:grid; place-items:center; flex-shrink:0; }
  .row__ico svg { width:19px; height:19px; }
  .row__body { flex:1; min-width:0; }
  .row__t { font-weight:700; font-size:14.5px; }
  .row__d { font-family: var(--font-mono); font-size:11.5px; color: var(--fg-subtle); margin-top:2px; }
  .row__amt { text-align:right; }
  .row__v { font-family: var(--font-mono); font-weight:700; font-size: 16px; }
  .row__v.pos { color: var(--pos); } .row__v.neg { color: var(--neg); }
  .row__bal { font-family: var(--font-mono); font-size:11px; color: var(--fg-subtle); margin-top:2px; }
  .hidden { display:none !important; }
  .empty { padding:48px; text-align:center; color: var(--fg-subtle); }

  @media (max-width: 900px){ .sum-row{grid-template-columns:1fr;} .search{margin-left:0; order:3; width:100%;} }
</style>
</head>
<body data-screen="extrato">
<main>
  <header class="page-head" data-screen-label="Extrato">
    <span class="eyebrow">EXTRATO</span>
    <h1 class="h-display">Cada ponto, rastreado.</h1>
  </header>

  <section class="sum-row">
    <div class="card sum"><div class="sum__label">Entradas · mês</div><div class="sum__val pos" id="sumIn">—</div></div>
    <div class="card sum"><div class="sum__label">Saídas · mês</div><div class="sum__val neg" id="sumOut">—</div></div>
    <div class="card sum"><div class="sum__label">Saldo atual</div><div class="sum__val" id="sumBal">—</div></div>
  </section>

  <div class="toolbar">
    <div class="tabs">
      <button class="on" data-f="all">Tudo</button>
      <button data-f="in">Entradas</button>
      <button data-f="out">Saídas</button>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input type="text" id="q" placeholder="Buscar movimento...">
    </div>
  </div>

  <div id="ledger"><div class="empty">Carregando…</div></div>
</main>
<script src="chrome.js"></script>
<script>
(function(){
  var DEFAULT_API = 'https://blaxx-pontos-exe.onrender.com';
  function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
  function token(){ try { return (JSON.parse(localStorage.getItem('blaxx_session')||'null')||{}).token || null; } catch(e){ return null; } }
  function H(){ var t=token(); return t? {Authorization:'Bearer '+t} : {}; }
  var $ = function(id){ return document.getElementById(id); };
  var fmt = function(n){ return Number(n||0).toLocaleString('pt-BR'); };

  if (!token()) { location.href = 'login.html'; return; }

  var ICON_UP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
  var ICON_DOWN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>';
  var MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  function dayKey(d){
    var now = new Date(); var t0 = new Date(now.getFullYear(),now.getMonth(),now.getDate());
    var dd = new Date(d.getFullYear(),d.getMonth(),d.getDate());
    var diff = Math.round((t0 - dd)/86400000);
    if (diff === 0) return 'Hoje';
    if (diff === 1) return 'Ontem';
    return d.getDate() + ' ' + MONTHS[d.getMonth()];
  }
  function hm(d){ return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }

  var filter = 'all', query = '';
  var TX = [];

  function render(){
    var q = query.toLowerCase();
    var groups = {}; var order = [];
    TX.forEach(function(t){
      var inOut = (t.amount_pts >= 0) ? 'in' : 'out';
      if (filter !== 'all' && inOut !== filter) return;
      if (q && (t.description||'').toLowerCase().indexOf(q) < 0) return;
      var d = new Date(t.created_at);
      var key = dayKey(d);
      if (!groups[key]){ groups[key] = []; order.push(key); }
      groups[key].push({ t:t, d:d, inOut:inOut });
    });
    if (!order.length){ $('ledger').innerHTML = '<div class="empty">Nenhum movimento encontrado.</div>'; return; }
    var html = '';
    order.forEach(function(key){
      html += '<div class="day-label">'+key+'</div><div class="card ledger">';
      groups[key].forEach(function(it){
        var pos = it.inOut === 'in';
        var statusTxt = it.t.status && it.t.status !== 'confirmed' ? (' · '+it.t.status) : '';
        html += '<div class="row">'
          + '<span class="row__ico" style="background:var(--lime-12);color:var(--'+(pos?'pos':'neg')+')">'+(pos?ICON_UP:ICON_DOWN)+'</span>'
          + '<div class="row__body"><div class="row__t">'+(it.t.description||'Movimento')+'</div>'
          + '<div class="row__d">'+hm(it.d)+statusTxt+'</div></div>'
          + '<div class="row__amt"><div class="row__v '+(pos?'pos':'neg')+'">'+(pos?'+':'−')+fmt(Math.abs(it.t.amount_pts))+'</div>'
          + '<div class="row__bal">pts</div></div>'
          + '</div>';
      });
      html += '</div>';
    });
    $('ledger').innerHTML = html;
  }

  function summarize(){
    var now = new Date(); var inSum=0, outSum=0;
    TX.forEach(function(t){
      var d = new Date(t.created_at);
      if (d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()){
        if (t.amount_pts >= 0) inSum += t.amount_pts; else outSum += Math.abs(t.amount_pts);
      }
    });
    $('sumIn').textContent = '+'+fmt(inSum);
    $('sumOut').textContent = '−'+fmt(outSum);
  }

  document.querySelectorAll('.tabs button').forEach(function(b){
    b.addEventListener('click', function(){ document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); filter=b.dataset.f; render(); });
  });
  $('q').addEventListener('input', function(e){ query=e.target.value; render(); });

  Promise.all([
    fetch(apiBase()+'/wallet/', {headers:H()}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch(apiBase()+'/wallet/transactions?limit=100', {headers:H()}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  ]).then(function(res){
    var w = res[0], tx = res[1];
    if (w) $('sumBal').textContent = fmt(w.balance_pts);
    TX = (tx && tx.items) ? tx.items : [];
    summarize(); render();
  });
})();
</script>
</body>
</html>
