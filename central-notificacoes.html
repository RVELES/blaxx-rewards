<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaXx · Notificações</title>
<link rel="stylesheet" href="styles.css">
<style>
  .page-head { margin-bottom: 24px; }
  .nf-bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
  .nf-pills { display:flex; gap:8px; flex-wrap:wrap; }
  .nf-pill { border:1px solid var(--line); background: var(--white); color: var(--fg-muted); font-weight:700; font-size:13px; padding:8px 16px; border-radius: var(--r-pill); cursor:pointer; transition: all .16s var(--ease); }
  .nf-pill.on { background: var(--lime); border-color: var(--lime); color: var(--ink); }
  .nf-readall { margin-left:auto; }
  .nf-list { padding:0; overflow:hidden; }
  .nf { display:flex; gap:14px; padding:18px 22px; cursor:pointer; transition: background .15s var(--ease); }
  .nf + .nf { border-top:1px solid var(--line); }
  .nf:hover { background: rgba(14,15,11,0.025); }
  .nf.unread { background: var(--lime-12); }
  .nf__ico { width:42px; height:42px; border-radius:11px; display:grid; place-items:center; flex-shrink:0; background: var(--lime-12); font-size:18px; }
  .nf__b { flex:1; min-width:0; }
  .nf__top { display:flex; justify-content:space-between; gap:10px; }
  .nf__t { font-weight:700; font-size:14.5px; }
  .nf__time { font-family: var(--font-mono); font-size:11px; color: var(--fg-subtle); white-space:nowrap; }
  .nf__d { font-size:13.5px; color: var(--fg-muted); margin-top:4px; }
  .nf__dot { width:8px; height:8px; border-radius:50%; background: var(--lime); align-self:flex-start; margin-top:7px; flex-shrink:0; }
  .nf-empty { padding:48px; text-align:center; color: var(--fg-subtle); }
</style>
</head>
<body data-screen="central-notificacoes">
<main>
  <header class="page-head" data-screen-label="Notificações">
    <span class="eyebrow">CENTRAL DE NOTIFICAÇÕES</span>
    <h1 class="h-display">Tudo que aconteceu na sua conta.</h1>
  </header>

  <div class="nf-bar">
    <div class="nf-pills">
      <button class="nf-pill on" data-f="all">Todas</button>
      <button class="nf-pill" data-f="unread">Não lidas</button>
    </div>
    <button id="readAll" class="btn btn--outline btn--sm nf-readall">Marcar todas como lidas</button>
  </div>

  <div class="card nf-list" id="list"><div class="nf-empty">Carregando…</div></div>
</main>
<script src="chrome.js"></script>
<script>
(function(){
  var DEFAULT_API = 'https://blaxx-pontos-exe.onrender.com';
  function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
  function token(){ try { return (JSON.parse(localStorage.getItem('blaxx_session')||'null')||{}).token || null; } catch(e){ return null; } }
  function H(){ var t=token(); return t? {'Content-Type':'application/json','Authorization':'Bearer '+t} : {'Content-Type':'application/json'}; }
  var $ = function(id){ return document.getElementById(id); };

  if (!token()) { location.href = 'login.html'; return; }

  var ITEMS = [], filter = 'all';
  var DEFAULT_ICONS = { purchase:'＋', transfer:'↪', expiration:'⏱', campaign:'▲', system:'★', redeem:'★' };

  function ago(iso){
    var d = new Date(iso), s = (Date.now()-d)/1000;
    if (s < 60) return 'agora';
    if (s < 3600) return 'há '+Math.floor(s/60)+'min';
    if (s < 86400) return 'há '+Math.floor(s/3600)+'h';
    var days = Math.floor(s/86400);
    if (days < 30) return 'há '+days+'d';
    return d.toLocaleDateString('pt-BR');
  }

  function render(){
    var list = ITEMS.filter(function(n){ return filter==='all' || (filter==='unread' && !n.read_at); });
    if (!list.length){ $('list').innerHTML = '<div class="nf-empty">'+(filter==='unread'?'Nenhuma não lida.':'Nenhuma notificação ainda.')+'</div>'; return; }
    $('list').innerHTML = list.map(function(n){
      var unread = !n.read_at;
      var ico = n.icon || DEFAULT_ICONS[n.type] || '•';
      return '<div class="nf '+(unread?'unread':'')+'" data-id="'+n.id+'">'
        + '<span class="nf__ico">'+ico+'</span>'
        + '<div class="nf__b"><div class="nf__top"><span class="nf__t">'+(n.title||'')+'</span><span class="nf__time">'+ago(n.created_at)+'</span></div>'
        + (n.body?('<div class="nf__d">'+n.body+'</div>'):'')+'</div>'
        + (unread?'<span class="nf__dot"></span>':'')
        + '</div>';
    }).join('');
    $('list').querySelectorAll('.nf').forEach(function(el){
      el.addEventListener('click', function(){ markRead(el.dataset.id); });
    });
  }

  function markRead(id){
    var n = ITEMS.filter(function(x){return x.id===id;})[0];
    if (!n || n.read_at) return;
    n.read_at = new Date().toISOString();
    render();
    fetch(apiBase()+'/notifications/'+encodeURIComponent(id)+'/read', {method:'PATCH', headers:H()}).catch(function(){});
  }

  document.querySelectorAll('.nf-pill').forEach(function(b){
    b.addEventListener('click', function(){ document.querySelectorAll('.nf-pill').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); filter=b.dataset.f; render(); });
  });
  $('readAll').addEventListener('click', function(){
    ITEMS.forEach(function(n){ n.read_at = n.read_at || new Date().toISOString(); });
    render();
    fetch(apiBase()+'/notifications/read-all', {method:'POST', headers:H()}).catch(function(){});
  });

  fetch(apiBase()+'/notifications/', {headers:H()})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(j){ ITEMS = (j && j.items) ? j.items : []; render(); })
    .catch(function(){ $('list').innerHTML='<div class="nf-empty">Não foi possível carregar.</div>'; });
})();
</script>
</body>
</html>
