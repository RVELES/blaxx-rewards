<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaXx · Enviar pontos</title>
<link rel="stylesheet" href="styles.css">
<style>
  .page-head { margin-bottom: 24px; }
  .send-grid { display:grid; grid-template-columns: 1fr 360px; gap:24px; align-items:start; }
  .form-card { padding: 28px 30px; }
  .field { margin-bottom: 22px; }
  .field label { display:block; font-family: var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color: var(--fg-muted); margin-bottom:10px; }
  .input { width:100%; border:1.5px solid var(--line); background: var(--cream); border-radius: var(--r-md); padding: 14px 16px; font-family: var(--font-body); font-size:15px; color: var(--fg); outline:none; transition: border-color .18s var(--ease), box-shadow .18s var(--ease); }
  .input:focus { border-color: var(--lime-deep); box-shadow: 0 0 0 3px var(--lime-20); }

  .amount-wrap { position:relative; }
  .amount-input { width:100%; border:1.5px solid var(--line); background: var(--cream); border-radius: var(--r-md); padding: 20px 16px; font-family: var(--font-mono); font-weight:700; font-size: 36px; letter-spacing:-.02em; color: var(--fg); outline:none; transition: border-color .18s var(--ease), box-shadow .18s var(--ease); }
  .amount-input:focus { border-color: var(--lime-deep); box-shadow: 0 0 0 3px var(--lime-20); }
  .quick { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .quick button { font-family: var(--font-mono); font-weight:700; font-size:12px; border:1px solid var(--line); background: var(--white); color: var(--fg-muted); padding:8px 14px; border-radius: var(--r-pill); cursor:pointer; transition: all .16s var(--ease); }
  .quick button:hover { border-color: var(--lime-deep); color: var(--ink); }

  .recap { padding: 26px; position:sticky; top:96px; }
  .recap__eyebrow { font-family: var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color: var(--fg-on-dark-muted); }
  .recap__to { display:flex; align-items:center; gap:12px; margin:18px 0; }
  .recap__to .av { width:44px; height:44px; border-radius:50%; background: var(--lime); color: var(--ink); display:grid; place-items:center; font-weight:800; font-size:17px; }
  .recap__amt { font-family: var(--font-mono); font-weight:700; font-size: 44px; color: var(--lime); letter-spacing:-.03em; }
  .rline { display:flex; justify-content:space-between; padding:11px 0; font-size:14px; }
  .rline + .rline { border-top:1px solid rgba(244,246,238,.1); }
  .rline .k { color: var(--fg-on-dark-muted); } .rline .v { font-family: var(--font-mono); font-weight:700; }
  .free-tag { display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size:11px; font-weight:700; color: var(--lime); }
  .msgbox { font-size:13px; padding:11px 13px; border-radius: var(--r-sm); margin-top:14px; }
  .msgbox.err { background: rgba(224,72,61,.1); border:1px solid rgba(224,72,61,.4); color:#ffd9d4; }
  .msgbox.ok { background: rgba(174,230,58,.12); border:1px solid var(--lime-40); color: var(--lime); }

  @media (max-width: 900px){ .send-grid{grid-template-columns:1fr;} .recap{position:static;} }
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Início","item":"https://blaxxpontos.com.br/"},{"@type":"ListItem","position":2,"name":"Enviar","item":"https://blaxxpontos.com.br/enviar.html"}]}
</script>
</head>
<body data-screen="enviar">
<main>
  <header class="page-head" data-screen-label="Enviar pontos">
    <span class="eyebrow">ENVIAR PONTOS</span>
    <h1 class="h-display">Pontos pra quem você curte.</h1>
    <p class="lead"><b>Zero taxa</b> entre amigos BlaXx. A transferência cai na hora.</p>
  </header>

  <div class="send-grid">
    <div class="card form-card">
      <div class="field">
        <label>Enviar para</label>
        <input class="input" type="text" id="who" placeholder="E-mail ou CPF do destinatário" autocomplete="off">
      </div>

      <div class="field">
        <label>Quanto enviar</label>
        <div class="amount-wrap">
          <input class="amount-input" type="text" id="amt" value="" placeholder="0" inputmode="numeric">
        </div>
        <div class="quick">
          <button data-v="500">500</button>
          <button data-v="1000">1.000</button>
          <button data-v="5000">5.000</button>
          <button data-v="10000">10.000</button>
          <button data-all="1">Tudo</button>
        </div>
      </div>

      <div class="field">
        <label>Mensagem (opcional)</label>
        <input class="input" type="text" id="msg" placeholder="Valeu pela força! 🙌" maxlength="140">
      </div>

      <div class="field" style="margin-bottom:0">
        <label>Sua senha (confirmação)</label>
        <input class="input" type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <aside class="card card--dark recap">
      <span class="recap__eyebrow">Resumo do envio</span>
      <div class="recap__to">
        <span class="av" id="toAv">?</span>
        <div><div style="font-weight:700" id="toName">destinatário</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-on-dark-muted)">Conta BlaXx</div></div>
      </div>
      <div class="recap__amt" id="recapAmt">0</div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--fg-on-dark-muted);margin-bottom:18px">pontos</div>

      <div class="rline"><span class="k">Taxa de envio</span><span class="free-tag">✓ GRÁTIS</span></div>
      <div class="rline"><span class="k">Saldo atual</span><span class="v" id="balNow">—</span></div>
      <div class="rline"><span class="k">Saldo após envio</span><span class="v" id="after">—</span></div>

      <div id="msgBox" class="msgbox" style="display:none"></div>

      <button id="btnSend" type="button" class="btn btn--primary btn--block" style="margin-top:18px">Enviar agora →</button>
      <p style="text-align:center;font-family:var(--font-mono);font-size:10.5px;color:var(--fg-on-dark-muted);margin:12px 0 0">MÍNIMO 100 PTS · LIMITE 50.000/DIA · IRREVERSÍVEL</p>
    </aside>
  </div>
</main>
<script src="chrome.js"></script>
<script>
(function(){
  var DEFAULT_API = 'https://blaxx-pontos-exe.onrender.com';
  function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
  function token(){ try { return (JSON.parse(localStorage.getItem('blaxx_session')||'null')||{}).token || null; } catch(e){ return null; } }
  function authHeaders(){ var t=token(); return t? {'Content-Type':'application/json','Authorization':'Bearer '+t} : {'Content-Type':'application/json'}; }
  var $ = function(id){ return document.getElementById(id); };
  var fmt = function(n){ return Number(n||0).toLocaleString('pt-BR'); };
  var parse = function(s){ return parseInt((s||'').replace(/\D/g,'')) || 0; };

  if (!token()) { location.href = 'login.html'; return; }

  var balance = 0;
  function loadWallet(){
    fetch(apiBase()+'/wallet/', { headers: authHeaders() })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(w){ if(!w) return; balance = Number(w.balance_pts||0); $('balNow').textContent = fmt(balance); recalc(); })
      .catch(function(){});
  }

  function recalc(){
    var v = parse($('amt').value);
    $('recapAmt').textContent = fmt(v);
    $('after').textContent = fmt(Math.max(0, balance - v));
  }
  function setTo(){
    var w = $('who').value.trim();
    var nm = w || 'destinatário';
    $('toName').textContent = nm;
    $('toAv').textContent = (w.replace('@','')[0] || '?').toUpperCase();
  }
  function show(type, text){ var b=$('msgBox'); b.className='msgbox '+type; b.textContent=text; b.style.display='block'; }
  function hide(){ $('msgBox').style.display='none'; }

  $('amt').addEventListener('input', function(){ var v=parse($('amt').value); $('amt').value = v? fmt(v):''; recalc(); });
  $('who').addEventListener('input', setTo);
  document.querySelectorAll('.quick button').forEach(function(b){
    b.addEventListener('click', function(){ var v = b.dataset.all ? balance : (+b.dataset.v); $('amt').value = fmt(v); recalc(); });
  });

  $('btnSend').addEventListener('click', function(){
    hide();
    var who = $('who').value.trim();
    var amount = parse($('amt').value);
    var msg = $('msg').value.trim();
    var pw = $('pw').value;
    if (!who){ show('err','Informe o e-mail ou CPF do destinatário.'); return; }
    if (amount < 100){ show('err','Valor mínimo de envio é 100 pts.'); return; }
    if (amount > balance){ show('err','Saldo insuficiente.'); return; }
    if (!pw){ show('err','Confirme com sua senha.'); return; }
    var body = { to: who, amount_pts: amount, password: pw };
    if (msg) body.message = msg;
    var btn = $('btnSend'); btn.disabled = true; var old = btn.textContent; btn.textContent = 'Enviando…';
    fetch(apiBase()+'/transfer/', { method:'POST', headers: authHeaders(), body: JSON.stringify(body) })
      .then(function(r){ return r.json().then(function(j){ return { s:r.status, j:j }; }); })
      .then(function(res){
        btn.disabled = false; btn.textContent = old;
        if (res.s === 201 || (res.j && res.j.receipt_code)){
          show('ok','Enviado! Comprovante '+(res.j.receipt_code||'')+'. Redirecionando…');
          $('pw').value=''; $('amt').value=''; recalc();
          setTimeout(function(){ location.href='extrato.html'; }, 1400);
          return;
        }
        show('err', (res.j && res.j.error) || 'Não foi possível enviar.');
      })
      .catch(function(e){ btn.disabled=false; btn.textContent=old; show('err','Falha de conexão: '+e.message); });
  });

  setTo(); loadWallet();
})();
</script>
</body>
</html>
