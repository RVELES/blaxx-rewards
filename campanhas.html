<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlaXx · Campanhas</title>
<link rel="stylesheet" href="styles.css">
<style>
  .page-head { margin-bottom: 24px; }
  .cgrid { display:grid; grid-template-columns: repeat(2,1fr); gap:18px; }
  .camp { padding: 24px 26px; display:flex; flex-direction:column; }
  .camp__top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:12px; }
  .camp__title { font-family: var(--font-display); font-weight:900; font-size: 20px; letter-spacing:-.01em; }
  .camp__sub { font-size:13.5px; color: var(--fg-muted); margin-top:4px; }
  .camp__reward { font-family: var(--font-mono); font-weight:700; font-size:14px; color: var(--lime-deep); white-space:nowrap; }
  .camp__prog { margin-top:auto; padding-top:18px; }
  .camp__meta { display:flex; justify-content:space-between; font-family: var(--font-mono); font-size:11.5px; color: var(--fg-muted); margin-bottom:9px; }
  .bar { height:8px; border-radius:999px; background: var(--line); overflow:hidden; }
  .bar__fill { height:100%; border-radius:999px; background: linear-gradient(90deg,var(--lime-deep),var(--lime)); width:0; transition: width 1s var(--ease-out); }
  .camp__foot { display:flex; align-items:center; justify-content:space-between; margin-top:16px; gap:10px; }
  .time-tag { font-family: var(--font-mono); font-size:11px; font-weight:700; padding:5px 11px; border-radius: var(--r-pill); background: rgba(232,169,51,.15); color:#8a6a00; }
  .done-tag { background: var(--lime); color: var(--ink); font-family: var(--font-mono); font-size:11px; font-weight:700; padding:5px 11px; border-radius: var(--r-pill); }
  .empty { grid-column:1/-1; text-align:center; padding:48px; color: var(--fg-subtle); }
  @media (max-width: 900px){ .cgrid{grid-template-columns:1fr;} }
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Início","item":"https://blaxxpontos.com.br/"},{"@type":"ListItem","position":2,"name":"Campanhas","item":"https://blaxxpontos.com.br/campanhas.html"}]}
</script>
</head>
<body data-screen="campanhas">
<main>
  <header class="page-head" data-screen-label="Campanhas">
    <span class="eyebrow">CAMPANHAS</span>
    <h1 class="h-display">Missões que valem pontos.</h1>
    <p class="lead">Participe das campanhas ativas e ganhe pontos extras ao bater as metas.</p>
  </header>

  <div class="cgrid" id="cgrid"><div class="empty">Carregando…</div></div>
</main>
<script src="chrome.js"></script>
<script>
(function(){
  var DEFAULT_API = 'https://blaxx-pontos-exe.onrender.com';
  function apiBase(){ try { return (localStorage.getItem('blaxx_api_url') || DEFAULT_API).replace(/\/+$/,''); } catch(e){ return DEFAULT_API; } }
  function token(){ try { return (JSON.parse(localStorage.getItem('blaxx_session')||'null')||{}).token || null; } catch(e){ return null; } }
  function H(){ var t=token(); return t? {'Content-Type':'application/json','Authorization':'Bearer '+t} : {'Content-Type':'application/json'}; }
  var $ = function(id){ return document.getElementById(id); };
  var fmt = function(n){ return Number(n||0).toLocaleString('pt-BR'); };

  var ITEMS = [];

  function daysLeft(end){
    if(!end) return null;
    var d = Math.ceil((new Date(end) - Date.now())/86400000);
    return d;
  }

  function render(){
    if (!ITEMS.length){ $('cgrid').innerHTML = '<div class="empty">Nenhuma campanha ativa no momento.</div>'; return; }
    $('cgrid').innerHTML = ITEMS.map(function(c){
      var pct = c.completed_at ? 100 : (c.progress_pct||0);
      var dl = daysLeft(c.period_end);
      var foot;
      if (c.completed_at){ foot = '<span class="done-tag">✓ CONCLUÍDA</span>'; }
      else if (!c.joined){ foot = '<button class="btn btn--primary btn--sm" data-join="'+c.id+'">Participar →</button>'; }
      else { foot = '<span class="time-tag">EM ANDAMENTO</span>'; }
      var timeInfo = (dl!==null && dl>=0 && !c.completed_at) ? ('<span class="time-tag">'+(dl===0?'ÚLTIMO DIA':('FALTAM '+dl+' DIAS'))+'</span>') : '<span></span>';
      return '<div class="card camp">'
        + '<div class="camp__top"><div><div class="camp__title">'+(c.name||'')+'</div>'
        + '<div class="camp__sub">'+(c.description||c.mechanic||'')+'</div></div>'
        + '<span class="camp__reward">+'+fmt(c.reward_pts)+'</span></div>'
        + '<div class="camp__prog"><div class="camp__meta"><span>Meta R$ '+fmt(c.target_brl)+'</span><span>'+pct+'%</span></div>'
        + '<div class="bar"><div class="bar__fill" style="width:'+pct+'%"></div></div>'
        + '<div class="camp__foot">'+timeInfo+foot+'</div></div>'
        + '</div>';
    }).join('');
    $('cgrid').querySelectorAll('[data-join]').forEach(function(b){
      b.addEventListener('click', function(){ join(b.dataset.join, b); });
    });
  }

  function join(id, btn){
    if (!token()){ location.href='login.html'; return; }
    btn.disabled = true; btn.textContent = 'Entrando…';
    fetch(apiBase()+'/campaigns/'+encodeURIComponent(id)+'/join', {method:'POST', headers:H()})
      .then(function(r){ return r.json().then(function(j){ return {s:r.status,j:j}; }); })
      .then(function(res){
        if (res.s===200 || res.s===201){
          var c = ITEMS.filter(function(x){return x.id===id;})[0];
          if (c) c.joined = true;
          render();
        } else { btn.disabled=false; btn.textContent='Participar →'; alert((res.j&&res.j.error)||'Não foi possível participar.'); }
      })
      .catch(function(e){ btn.disabled=false; btn.textContent='Participar →'; alert('Falha: '+e.message); });
  }

  fetch(apiBase()+'/campaigns/', {headers:H()})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(j){ ITEMS = (j && j.items) ? j.items : []; render(); })
    .catch(function(){ $('cgrid').innerHTML='<div class="empty">Não foi possível carregar as campanhas.</div>'; });
})();
</script>
</body>
</html>
