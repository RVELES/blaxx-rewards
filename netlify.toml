  to = "/central-ajuda.html"
  status = 301

[[redirects]]
  from = "/ajuda"
  to = "/central-ajuda.html"
  status = 301

# -----------------------------------------------------------------------------
# Rotas bonitas: URL sem extensao -> pagina .html correspondente.
