# Configuracao Netlify para o frontend Blaxx Pontos

[build]
  publish = "."           # Toda a pasta blaxx/ vira o site
  command = ""            # Sem build step - HTML/CSS/JS puros

[build.environment]
  NODE_VERSION = "20"

# Imagens podem ficar 24h em cache (mudam pouco, sao bins grandes).
[[headers]]
  for = "/assets/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/assets/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/assets/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/assets/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# JS e CSS — no-cache + must-revalidate. Browser ainda cacheia (rapido),
# mas faz uma request HEAD em cada reload pra checar se mudou via ETag.
# Antes era max-age=86400 e usuario via codigo antigo ate 24h apos deploy.
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Service worker NUNCA pode ser cacheado pelo CDN
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest tambem
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Headers de seguranca basicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Home: landing neon (force = true obrigatório para shadowing do index.html existente)
[[redirects]]
  from = "/"
  to = "/blaxx-neon.html"
  status = 200
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Rota /lander — legado de URL Forwarding do GoDaddy que aponta para este caminho.
# Enquanto o DNS do GoDaddy não for corrigido para apontar diretamente ao Netlify,
# qualquer visita que chegue em /lander é redirecionada para a home (301 permanente).
[[redirects]]
  from = "/lander"
  to = "/"
  status = 301

[[redirects]]
  from = "/lander/*"
  to = "/"
  status = 301

# -----------------------------------------------------------------------------
# Aliases de URL: nomes amigaveis em portugues que apontam pras paginas reais.
# Reduz quebra de navegacao externa (links compartilhados, anuncios, etc).
# status=301 = redirect permanente (preserva SEO e atualiza bookmarks).
# -----------------------------------------------------------------------------
