<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080907">
<title>Em manutenção | BlaXx</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BlaXx">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body style="background:var(--black);color:white;min-height:100vh;display:grid;place-items:center;padding:32px;">
<main style="max-width:560px;text-align:center;">
    <div class="mark" style="width:64px;height:64px;border-radius:18px;background:var(--lime);color:var(--black);display:grid;place-items:center;margin:0 auto 22px;font-size:28px;font-weight:900;">B</div>
    <span class="kicker">⚙ Manutenção em andamento</span>
    <h1 style="color:white;font-size:48px;margin-top:14px;">Estamos fazendo um<br>upgrade rapidinho.</h1>
    <p style="color:#b8bdaf;max-width:48ch;margin:14px auto 26px;">Nossa equipe está deixando o Blaxx ainda melhor. Volte em alguns minutos. Os seus pontos estão seguros.</p>

    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
        <span class="status pendente">● Estimativa: 30 min</span>
        <span class="status info">Início: 03h00 BRT</span>
    </div>

    <p style="color:#8a918a;font-size:13px;margin-top:36px;">Acompanhe o status em <a href="#" style="color:var(--lime);">status.blaxxpontos.com.br</a></p>
</main>
</body>
</html>
